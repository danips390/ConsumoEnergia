name: Run Notebook and Export GeoJSON

on:
  schedule:
    - cron: "*/1  * * * *"
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install nbconvert nbformat ipykernel geopandas pandas shapely fiona pyproj

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute "CódigoTomaDatos V4.0.ipynb" --output executed.ipynb

      - name: Verify GeoJSON exists
        run: |
          ls -lh *.geojson || echo "No GeoJSON found"

      - name: Upload GeoJSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: geojson-output
          path: "*.geojson"

      - name: Commit GeoJSON to repo (optional)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.geojson || echo "No files"
          git commit -m "Update GeoJSON" || echo "No changes"
          git push
