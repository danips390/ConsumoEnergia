# Nombre del flujo de trabajo
name: Cron de Monitoreo Energetico Tuya

# Definición de cuándo se ejecuta
on:
  schedule:
    # Se ejecuta cada 5 minutos (máxima frecuencia estable en GitHub Free)
    - cron: '*/5 * * * *'
  
  # Permite ejecutarlo manualmente desde el botón "Run workflow" en la pestaña Actions
  workflow_dispatch:

# Tareas que va a realizar
jobs:
  ejecutar-script:
    runs-on: ubuntu-latest
    
    # Permisos para que el bot de GitHub pueda subir los archivos generados (.csv y .geojson)
    permissions:
      contents: write

    steps:
      # 1. Copia los archivos de tu repositorio a la máquina virtual de GitHub
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      # 2. Instala Python versión 3.10
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instala las librerías necesarias
      - name: Instalar librerias de Tuya y Pandas
        run: |
          python -m pip install --upgrade pip
          pip install tuya-connector-python pandas

      # 4. Ejecuta el script de Python pasándole las credenciales de forma segura
      - name: Ejecutar toma_datos.py
        env:
          # Estos nombres (TUYA_ACCESS_ID) deben coincidir con os.getenv() en tu Python
          # Los valores se toman de los "Secrets" que debes configurar en GitHub
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_KEY: ${{ secrets.TUYA_ACCESS_KEY }}
        run: python toma_datos.py

      # 5. Sube los cambios generados (CSVs y GeoJSONs) al repositorio
      - name: Guardar y subir cambios
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Agrega las carpetas donde se guardan los resultados
          # Si las carpetas no existen, git add no fallará si usas el flag -A
          git add data_raw/ data_conv/
          
          # Verifica si hay algo nuevo que subir para evitar errores
          if git diff --quiet && git diff --staged --quiet; then
            echo "Sin cambios detectados en esta ejecucion."
          else
            git commit -m "Auto-update: Datos de energia $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
