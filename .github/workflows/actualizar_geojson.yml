name: Cron de Monitoreo Energetico Tuya

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias de Tuya y Pandas
        run: |
          python -m pip install --upgrade pip
          pip install tuya-connector-python pandas

      - name: Ejecutar toma_datos.py
        env:
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_KEY: ${{ secrets.TUYA_ACCESS_KEY }}
        run: python toma_datos.py

      - name: Guardar y subir cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Sin cambios detectados."
            exit 0
          fi

          git commit -m "Auto-update: Datos de energia $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:${{ github.ref_name }}
