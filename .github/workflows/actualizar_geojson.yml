name: Actualizacion de Datos Tuya

on:
  schedule:
    # Se ejecuta cada 5 minutos (intervalo mínimo recomendado en GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutar el script manualmente desde la pestaña "Actions"

jobs:
  build:
    runs-on: ubuntu-latest
    # Permisos necesarios para que el bot pueda escribir en tu repositorio
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install tuya-connector-python pandas

      - name: Ejecutar script de toma de datos
        env:
          # Configura estos secretos en Settings > Secrets > Actions de tu repo
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_KEY: ${{ secrets.TUYA_ACCESS_KEY }}
        run: python toma_datos.py

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Añade todos los archivos generados en las carpetas de datos
          git add data_raw/* data_conv/*
          
          # Solo hace el commit si detecta que hubo cambios reales
          if git diff --quiet && git diff --staged --quiet; then
            echo "No hay cambios para subir"
          else
            git commit -m "Actualización automática: $(date -u) [skip ci]"
            git push
          fi
