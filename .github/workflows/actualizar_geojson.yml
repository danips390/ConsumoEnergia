name: Cron de Monitoreo Energetico Tuya

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# ESTA ES LA PARTE QUE SOLUCIONA TU ERROR
permissions:
  contents: write  # Permite al script subir archivos al repositorio

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: |
          python -m pip install --upgrade pip
          pip install tuya-connector-python pandas

      - name: Ejecutar toma_datos.py
        env:
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_KEY: ${{ secrets.TUYA_ACCESS_KEY }}
        run: python toma_datos.py

      - name: Guardar y subir cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Añadimos los cambios
          git add data_raw/ data_conv/ monitoreo_global.geojson || true
          
          # Hacemos el commit solo si hay cambios
          if git diff --quiet && git diff --staged --quiet; then
            echo "Sin cambios detectados."
          else
            git commit -m "Auto-update: Datos $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
